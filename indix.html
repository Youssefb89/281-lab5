<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note-Vote</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body class="bg-light">

  <div class="container mt-5">

    <section id="todo" class="screen">
      <h1 class="text-center mb-5 display-4 fw-light">Note-Vote</h1>
      
      <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            
            <div class="card shadow border-0 mb-4">
                <button class="btn btn-white text-start w-100 d-flex align-items-center justify-content-between p-3 user-dropdown-btn" type="button" data-bs-toggle="collapse" data-bs-target="#logoutCollapse" aria-expanded="false">
                    <span><i class="bi bi-gear me-2"></i> Logged in as <span id="currentUserDisplay">Adam</span></span>
                    <i class="bi bi-chevron-down"></i>
                </button>
                <div class="collapse" id="logoutCollapse">
                    <div class="card-body text-center bg-white border-top">
                        <div class="dropdown">
                            <button class="btn btn-primary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                                Switch User
                            </button>
                            <ul class="dropdown-menu shadow-sm">
                                <li><a class="dropdown-item user-select" href="#" data-user="Adam">Adam</a></li>
                                <li><a class="dropdown-item user-select" href="#" data-user="Youssef">Youssef</a></li>
                                <li><a class="dropdown-item user-select" href="#" data-user="Guest">Guest</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card p-4 shadow-sm bg-light border-0">
                
                <div id="notesContainer"></div>

                <div class="input-group mt-3">
                    <input type="text" id="noteContent" class="form-control" placeholder="Enter a new note here">
                    <button id="postBtn" class="btn btn-outline-secondary">Add</button>
                </div>
            </div>
        </div>
      </div>
    </section>

    <section id="login" class="screen">
      <h1 class="text-center mb-5 display-4 fw-light">Note-Vote</h1>
      
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="accordion shadow-sm" id="authAccordion">
                
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseLogin">Log In</button>
                    </h2>
                    <div id="collapseLogin" class="accordion-collapse collapse show" data-bs-parent="#authAccordion">
                        <div class="accordion-body text-center p-4">
                            <h2 class="mb-3 fw-light">Log in</h2>
                            <div class="mb-3 text-start">
                                <label class="form-label">Email address</label>
                                <input type="email" class="form-control" placeholder="Email address">
                            </div>
                            <div class="mb-3 text-start">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" placeholder="Password">
                            </div>
                            <a href="#todo" class="btn btn-primary w-100">Log in</a>
                        </div>
                    </div>
                </div>

                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSignup">Register</button>
                    </h2>
                    <div id="collapseSignup" class="accordion-collapse collapse" data-bs-parent="#authAccordion">
                        <div class="accordion-body text-center p-4">
                            <h2 class="mb-3 fw-light">Sign up</h2>
                            <div class="mb-3 text-start">
                                <label class="form-label">Email address</label>
                                <input type="email" class="form-control" placeholder="Email address">
                            </div>
                            <div class="mb-3 text-start">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" placeholder="Password">
                            </div>
                            <div class="mb-3 text-start">
                                <label class="form-label">Invite Code</label>
                                <input type="text" class="form-control" placeholder="Invite Code">
                            </div>
                            <a href="#todo" class="btn btn-primary w-100">Sign Up</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
      </div>
    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  
  <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
